# Crypax 持续集成工作流。
#
# 在每次 push 到 main 或 PR 时强制跑：
#   - cargo fmt --check        代码格式（平台无关，只跑 ubuntu）
#   - cargo clippy -D warnings 零警告静态检查（平台无关，只跑 ubuntu）
#   - cargo test               三平台矩阵(ubuntu/windows/macos)，验证跨平台行为
#
# 三个 job 并行执行，任一失败即阻止合并。

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # 同分支新推送会取消还在跑的旧 CI，省额度
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --all-targets
